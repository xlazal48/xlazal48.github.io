<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario 3D con Shaders</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <script>
        // 1. LA MAGIA: REGISTRAMOS NUESTRO SHADER PERSONALIZADO EN GLSL
        AFRAME.registerShader('neon-animado', {
            schema: {
                timeMsec: {type: 'time', is: 'uniform'} // Usamos el reloj para animar
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec2 vUv;
                uniform float timeMsec;
                
                void main() {
                    float time = timeMsec / 1000.0; // Segundos
                    
                    // Matemáticas locas para crear ondas en movimiento
                    float wave = sin(vUv.y * 15.0 + time * 3.0) * 0.5 + 0.5;
                    float wave2 = cos(vUv.x * 10.0 - time * 2.0) * 0.5 + 0.5;
                    
                    // Colores Cyberpunk (Cyan y Magenta)
                    vec3 color1 = vec3(0.0, 1.0, 1.0); 
                    vec3 color2 = vec3(1.0, 0.0, 1.0); 
                    
                    // Mezclamos los colores según las ondas
                    vec3 finalColor = mix(color1, color2, wave * wave2);
                    
                    // Le damos el color final al pixel (con 0.9 de transparencia)
                    gl_FragColor = vec4(finalColor, 0.9); 
                }
            `
        });

        // 2. EL SCRIPT PARA LOS BOTONES
        AFRAME.registerComponent('boton-horario', {
            init: function () {
                let el = this.el;
                el.addEventListener('click', function () {
                    let horarioElegido = el.getAttribute('data-horario');
                    alert("¡Elegiste: " + horarioElegido + "!");
                });
                el.addEventListener('mouseenter', function () {
                    el.setAttribute('scale', '1.1 1.1 1.1');
                });
                el.addEventListener('mouseleave', function () {
                    el.setAttribute('scale', '1 1 1');
                });
            }
        });
    </script>
</head>
<body>
    <a-scene shadow="type: pcfsoft">
        
        <a-light type="ambient" color="#222"></a-light>
        <a-light type="directional" position="-2 4 2" intensity="1.5" castShadow="true"></a-light>

        <a-sky color="#0a0a12"></a-sky>

        <a-plane position="0 0 -4" rotation="-90 0 0" width="20" height="20" color="#111" shadow="receive: true"></a-plane>

        <a-text value="Selecciona tu Horario UPSLP" position="-1.8 3.5 -4" color="#FFFFFF" width="8"></a-text>

        <a-box position="-2 1.5 -4" 
               material="shader: neon-animado; transparent: true" 
               shadow="cast: true"
               boton-horario data-horario="Matutino (7:00 AM - 1:00 PM)">
            <a-text value="Matutino" position="-0.4 0 0.6" color="white" width="4"></a-text>
        </a-box>

        <a-box position="2 1.5 -4" 
               material="shader: neon-animado; transparent: true" 
               shadow="cast: true"
               boton-horario data-horario="Vespertino (2:00 PM - 8:00 PM)">
            <a-text value="Vespertino" position="-0.5 0 0.6" color="white" width="4"></a-text>
        </a-box>

        <a-camera>
            <a-cursor color="#FFF"></a-cursor>
        </a-camera>
    </a-scene>
</body>
</html>
